name: Daily AI Knowledge Collection

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_KB_DAILY_BUDGET_USD: "0.10"
          AI_KB_ANALYSIS_DEPTH: "normal"
          AI_KB_ANALYSIS_MODEL: "deepseek-v4-flash"
          AI_KB_DEEP_ANALYSIS_MODEL: "deepseek-v4-pro"
        run: |
          python pipeline/pipeline.py \
            --sources github \
            --limit 5 \
            --verbose

      - name: Validate collected articles
        run: |
          python hooks/validate_json.py knowledge/articles/*.json
          python hooks/check_quality.py knowledge/articles/*.json

      - name: Generate dashboard
        run: python reports/generate_dashboard.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add knowledge/ reports/
          if git diff --staged --quiet; then
            echo "No new articles to commit"
          else
            ARTICLE_COUNT=$(git diff --staged --name-only | grep -c 'knowledge/.*\.json$' || true)
            git commit -m "chore: daily collection - ${ARTICLE_COUNT} json files [$(date -u +%Y-%m-%d)]"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

      - name: Deploy dashboard to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
