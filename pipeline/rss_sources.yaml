# RSS data sources for the AI Knowledge Base pipeline.
# Each source requires: name, url, category, enabled.
#
# Categories:
#   general     - broad tech news aggregators
#   research    - academic paper feeds
#   open-source - foundation / community project blogs
#   framework   - LLM / Agent framework official blogs
#   chinese     - Chinese-language AI media
#
# Disabled sources are kept for reference but skipped during collection.

sources:
  - name: "Hacker News (Best)"
    url: "https://hnrss.org/best?q=AI+OR+LLM+OR+agent"
    category: "general"
    enabled: true

  - name: "arXiv cs.AI"
    url: "https://rss.arxiv.org/rss/cs.AI"
    category: "research"
    enabled: true

  - name: "Hugging Face Blog"
    url: "https://huggingface.co/blog/feed.xml"
    category: "open-source"
    enabled: true

  - name: "LangChain Blog"
    url: "https://blog.langchain.dev/rss/"
    category: "framework"
    enabled: true

  - name: "机器之心"
    url: "https://www.jiqizhixin.com/rss"
    category: "chinese"
    enabled: false
