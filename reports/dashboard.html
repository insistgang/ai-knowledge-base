<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Knowledge Base Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --surface: #ffffff;
      --surface-soft: #eef2f7;
      --border: #d9e0ea;
      --text: #172033;
      --muted: #617085;
      --blue: #2563a9;
      --green: #1f7a57;
      --amber: #a66a10;
      --red: #b4233a;
      --shadow: 0 12px 30px rgba(23, 32, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    a {
      color: var(--blue);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      padding: 28px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 38px;
      line-height: 1.1;
    }

    .subtitle {
      max-width: 760px;
      margin-bottom: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .meta {
      display: grid;
      grid-template-columns: auto auto;
      align-content: start;
      gap: 8px 14px;
      min-width: 280px;
      padding-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .meta strong {
      color: var(--text);
      font-weight: 700;
      text-align: right;
    }

    main {
      width: min(1440px, calc(100vw - 32px));
      margin: 24px auto 48px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric {
      min-height: 112px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .metric span {
      display: block;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .metric strong {
      display: block;
      font-size: 34px;
      line-height: 1;
    }

    .metric strong.compact {
      font-size: 28px;
    }

    .metric.warning {
      border-color: #efb0bb;
      background: #fff5f6;
    }

    .metric small {
      display: block;
      margin-top: 10px;
      color: var(--muted);
    }

    .workspace {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel,
    .article {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 18px;
      margin-bottom: 14px;
    }

    .panel h2,
    .section-title h2 {
      margin-bottom: 14px;
      font-size: 17px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    input,
    select {
      width: 100%;
      height: 40px;
      padding: 0 11px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    input:focus,
    select:focus {
      outline: 2px solid rgba(37, 99, 169, 0.18);
      border-color: var(--blue);
    }

    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag-button,
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--text);
      font-size: 12px;
      line-height: 1.2;
    }

    .tag-button {
      cursor: pointer;
    }

    .tag-button.active {
      border-color: var(--green);
      background: #e8f5ef;
      color: var(--green);
      font-weight: 700;
    }

    .score-bars {
      display: grid;
      gap: 8px;
    }

    .cost-runs {
      display: grid;
      gap: 10px;
    }

    .cost-run {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-soft);
    }

    .cost-run strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .cost-run span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .score-row {
      display: grid;
      grid-template-columns: 32px 1fr 28px;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .bar-track {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--surface-soft);
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--blue);
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 12px;
    }

    .section-title p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .article-list {
      display: grid;
      gap: 12px;
    }

    .article {
      padding: 18px;
    }

    .article-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
    }

    .article h3 {
      margin-bottom: 8px;
      font-size: 18px;
      line-height: 1.35;
    }

    .score {
      display: inline-grid;
      place-items: center;
      width: 52px;
      height: 52px;
      border-radius: 8px;
      color: #fff;
      font-size: 22px;
      font-weight: 800;
    }

    .score.high {
      background: var(--green);
    }

    .score.mid {
      background: var(--amber);
    }

    .score.low {
      background: var(--red);
    }

    .summary {
      margin-bottom: 12px;
      color: #2f3a4d;
    }

    .article-meta,
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .article-meta {
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .highlights {
      margin: 14px 0 0;
      padding-left: 18px;
      color: #2f3a4d;
    }

    .highlights li {
      margin-bottom: 6px;
    }

    .reason {
      margin-top: 12px;
      padding: 12px;
      border-left: 3px solid var(--blue);
      background: #edf4fb;
      color: #2f3a4d;
      font-size: 14px;
    }

    .empty {
      padding: 32px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      background: var(--surface);
    }

    @media (max-width: 980px) {
      .topbar,
      .workspace {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .meta strong {
        text-align: left;
      }
    }

    @media (max-width: 620px) {
      .topbar {
        padding: 22px 18px;
      }

      main {
        width: min(100vw - 20px, 1440px);
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 30px;
      }

      .article-header {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

          <select id="statusFilter"></select>
        </div>

        <div class="panel">
          <h2>热门标签</h2>
          <div class="tag-cloud" id="tagCloud"></div>
        </div>

        <div class="panel">
          <h2>分数分布</h2>
          <div class="score-bars" id="scoreBars"></div>

        <div class="panel">
          <h2>模型成本</h2>

      </aside>

      <section>
        <div class="section-title">

        <div class="article-list" id="articleList"></div>
      </section>
    </section>
  </main>

  <script>
    const payload = JSON.parse(document.getElementById("dashboard-data").textContent);
    const state = { tag: "all" };

    const queryInput = document.getElementById("query");
    const sourceFilter = document.getElementById("sourceFilter");
    const scoreFilter = document.getElementById("scoreFilter");
    const statusFilter = document.getElementById("statusFilter");
    const tagCloud = document.getElementById("tagCloud");
    const scoreBars = document.getElementById("scoreBars");
    const costRuns = document.getElementById("costRuns");
    const articleList = document.getElementById("articleList");
    const visibleCount = document.getElementById("visibleCount");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function scoreClass(score) {
      if (score >= 9) return "high";
      if (score >= 7) return "mid";
      return "low";
    }

    function option(value, label) {
      const item = document.createElement("option");
      item.value = value;
      item.textContent = label;
      return item;
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("en-US").format(Number(value || 0));
    }

    function formatUsd(value, digits = 4) {
      return `$${Number(value || 0).toFixed(digits)}`;
    }

    function setupMetrics() {
      document.getElementById("metricTotal").textContent = payload.stats.total;
      document.getElementById("metricLatest").textContent = payload.stats.latest_count;
      document.getElementById("metricLatestDate").textContent = payload.stats.latest_date;
      document.getElementById("metricAverage").textContent = payload.stats.avg_score;
      document.getElementById("metricHigh").textContent = payload.stats.high_score_count;
    }

    function setupCostMetrics() {
      const cost = payload.cost || {};
      const total = cost.total || {};
      const budget = cost.budget || {};
      const available = Boolean(cost.available);
      const exceeded = Boolean(budget.exceeded);

      document.getElementById("metricCalls").textContent = formatNumber(total.calls);
      document.getElementById("metricCostDate").textContent = available
        ? `${cost.date} 成本记录`
        : "暂无成本记录";
      document.getElementById("metricTokens").textContent = formatNumber(total.total_tokens);
      document.getElementById("metricCost").textContent = formatUsd(total.estimated_cost_usd, 6);
      document.getElementById("metricBudget").textContent = `预算 ${formatUsd(budget.budget_usd, 2)}`;
      document.getElementById("metricRemaining").textContent = formatUsd(budget.remaining_usd, 6);
      document.getElementById("metricBudgetStatus").textContent = exceeded ? "已触发 fallback" : "预算正常";
      document.getElementById("metricRemainingCard").classList.toggle("warning", exceeded);

      if (!available || !(cost.runs || []).length) {
        costRuns.innerHTML = '<div class="empty">暂无模型成本记录</div>';
        return;
      }

      costRuns.innerHTML = cost.runs.map((run) => `
        <div class="cost-run">
          <strong>${escapeHtml(run.model)}</strong>
          <span>${escapeHtml(run.source)} · ${formatNumber(run.calls)} calls</span>
          <span>${formatNumber(run.total_tokens)} tokens · ${formatUsd(run.estimated_cost_usd, 6)}</span>
        </div>
      `).join("");
    }

    function setupFilters() {
      const sources = [...new Set(payload.articles.map((article) => article.source))].sort();
      sourceFilter.appendChild(option("all", "全部来源"));
      sources.forEach((source) => sourceFilter.appendChild(option(source, source)));

      const statuses = [...new Set(payload.articles.map((article) => article.status))].sort();
      statusFilter.appendChild(option("all", "全部状态"));
      statuses.forEach((status) => statusFilter.appendChild(option(status, status)));

      [queryInput, sourceFilter, scoreFilter, statusFilter].forEach((item) => {
        item.addEventListener("input", renderArticles);
      });
    }

    function setupTags() {
      tagCloud.innerHTML = "";
      const all = document.createElement("button");
      all.className = "tag-button active";
      all.type = "button";
      all.textContent = "全部";
      all.addEventListener("click", () => setTag("all"));
      tagCloud.appendChild(all);

      payload.stats.top_tags.forEach(([tag, count]) => {
        const button = document.createElement("button");
        button.className = "tag-button";
        button.type = "button";
        button.dataset.tag = tag;
        button.textContent = `${tag} ${count}`;
        button.addEventListener("click", () => setTag(tag));
        tagCloud.appendChild(button);
      });
    }

    function setTag(tag) {
      state.tag = tag;
      document.querySelectorAll(".tag-button").forEach((button) => {
        button.classList.toggle("active", (button.dataset.tag || "all") === tag);
      });
      renderArticles();
    }

    function setupScoreBars() {
      const maxCount = Math.max(1, ...Object.values(payload.stats.score_counts));
      scoreBars.innerHTML = Object.entries(payload.stats.score_counts)
        .map(([score, count]) => {
          const width = Math.round((count / maxCount) * 100);
          return `
            <div class="score-row">
              <span>${escapeHtml(score)} 分</span>
              <div class="bar-track"><div class="bar-fill" style="width:${width}%"></div></div>
              <span>${escapeHtml(count)}</span>
            </div>
          `;
        })
        .join("");
    }

    function articleMatches(article) {
      const query = queryInput.value.trim().toLowerCase();
      const source = sourceFilter.value;
      const minScore = Number(scoreFilter.value);
      const status = statusFilter.value;
      const haystack = [
        article.title,
        article.summary,
        article.reason,
        article.source,
        article.status,
        ...(article.tags || []),
        ...(article.tech_highlights || [])
      ].join(" ").toLowerCase();

      if (query && !haystack.includes(query)) return false;
      if (source !== "all" && article.source !== source) return false;
      if (status !== "all" && article.status !== status) return false;
      if (article.score < minScore) return false;
      if (state.tag !== "all" && !(article.tags || []).includes(state.tag)) return false;
      return true;
    }

    function renderArticle(article) {
      const tags = (article.tags || [])
        .map((tag) => `<span class="chip">${escapeHtml(tag)}</span>`)
        .join("");
      const highlights = (article.tech_highlights || [])
        .map((item) => `<li>${escapeHtml(item)}</li>`)
        .join("");
      const sourceLink = article.source_url
        ? `<a href="${escapeHtml(article.source_url)}" target="_blank" rel="noreferrer">打开来源</a>`
        : "";

      return `
        <article class="article">
          <div class="article-header">
            <div>
              <h3>${escapeHtml(article.title)}</h3>
              <div class="article-meta">
                <span>${escapeHtml(article.date)}</span>
                <span>${escapeHtml(article.source)}</span>
                <span>${escapeHtml(article.status)}</span>
                ${sourceLink}
              </div>
            </div>
            <div class="score ${scoreClass(article.score)}">${escapeHtml(article.score)}</div>
          </div>
          <p class="summary">${escapeHtml(article.summary)}</p>
          <div class="chips">${tags}</div>
          ${highlights ? `<ul class="highlights">${highlights}</ul>` : ""}
          ${article.reason ? `<div class="reason">${escapeHtml(article.reason)}</div>` : ""}
        </article>
      `;
    }

    function renderArticles() {
      const visible = payload.articles.filter(articleMatches);
      visibleCount.textContent = `${visible.length} 条`;

      if (!visible.length) {
        articleList.innerHTML = '<div class="empty">没有匹配的知识条目</div>';
        return;
      }

      articleList.innerHTML = visible.map(renderArticle).join("");
    }

    setupMetrics();
    setupCostMetrics();
    setupFilters();
    setupTags();
    setupScoreBars();
    renderArticles();
  </script>
</body>
</html>
